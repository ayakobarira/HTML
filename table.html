<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Table example</title>
</head>
<body>
    <table border="1" width="300" height="300" align="center" color="black" cellpadding="10" cellspacing="16">
        <tr>
            <th colspan="5">Student info</th>
        </tr>
        <tr>
            <th rowspan="2">SR. NO</th>
            <th rowspan="2">Name</th>
            <th colspan="2">Contact</th>
            <th rowspan="2">Email</th>
        
        </tr>
        <tr>
            <th>Phone 1</th>
            <th>Phone 2</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Ayako</td>
            <td>1234567890</td>
            <td>0987123456</td>
            <td>ayako@example.com</td>
            
        </tr>
        <tr>
            <td>2</td>
            <td>Yuki</td>
            <td>0987654321</td>
            <td>0700123456</td>
            <td>yuki@example.com</td>
    
        </tr>
        <tr>
            <td>3</td>
            <td>Sora</td>
            <td>1122334455</td>
            <td>0811223344</td>
            <td>sora@example.com</td>
        
        </tr>
    </table>
</body>
</html>
